<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Temperature Converter</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-900 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-md bg-slate-800 rounded-2xl shadow-xl p-6">

        <h1 class="text-3xl font-bold text-center text-white mb-6">
            Temperature Converter
        </h1>

        <!-- Input -->
        <div class="mb-5">
            <label class="text-gray-300 block mb-2">Enter Temperature</label>
            <input type="number" id="tempInput" placeholder="Enter value"
                class="w-full px-4 py-3 rounded-lg bg-slate-700 text-white outline-none focus:ring-2 focus:ring-cyan-400">
        </div>

        <!-- From -->
        <div class="mb-5">
            <label class="text-gray-300 block mb-2">From</label>
            <select id="fromUnit"
                class="w-full px-4 py-3 rounded-lg bg-slate-700 text-white outline-none focus:ring-2 focus:ring-cyan-400">
                <option value="celsius">Celsius (°C)</option>
                <option value="fahrenheit">Fahrenheit (°F)</option>
            </select>
        </div>

        <!-- To -->
        <div class="mb-6">
            <label class="text-gray-300 block mb-2">To</label>
            <select id="toUnit"
                class="w-full px-4 py-3 rounded-lg bg-slate-700 text-white outline-none focus:ring-2 focus:ring-cyan-400">
                <option value="fahrenheit">Fahrenheit (°F)</option>
                <option value="celsius">Celsius (°C)</option>
            </select>
        </div>

        <!-- Buttons -->
        <div class="grid grid-cols-2 gap-4 mb-6">

            <button id="convertBtn"
                class="bg-cyan-500 hover:bg-cyan-600 transition py-3 rounded-lg text-white font-semibold">
                Convert
            </button>

            <button id="resetBtn"
                class="bg-red-500 hover:bg-red-600 transition py-3 rounded-lg text-white font-semibold">
                Reset
            </button>

        </div>

        <!-- Result -->
        <div class="bg-slate-700 rounded-xl p-5 text-center">

            <p class="text-gray-400 text-sm mb-2">
                Converted Temperature
            </p>

            <h2 id="result" class="text-4xl font-bold text-cyan-400">
                --
            </h2>

        </div>

    </div>
    <script>
        const tempInput = document.querySelector("#tempInput");
        const fromUnit = document.querySelector("#fromUnit");
        const toUnit = document.querySelector("#toUnit");
        const convertBtn = document.querySelector("#convertBtn");
        const resetBtn = document.querySelector("#resetBtn");
        const result = document.querySelector("#result");

        convertBtn.addEventListener("click", () => {
            const temp = Number(tempInput.value);
            if (fromUnit.value === "fahrenheit" && toUnit.value === "celsius") {
                const celsius = (temp - 32) * 5 / 9;
                result.innerHTML = celsius;
            }
            else if (toUnit.value === "fahrenheit" && fromUnit.value === "celsius") {
                const fahrenheit = (temp * 9 / 5) + 32;
                result.innerHTML = fahrenheit;
            }
        })
        resetBtn.addEventListener("click", () => {
            result.innerHTML = "--";
        })
    </script>
</body>

</html>
